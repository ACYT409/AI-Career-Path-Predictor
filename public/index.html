<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 职业方向预测</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input[type="email"], select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .camera-section {
            text-align: center;
            margin-bottom: 1.5rem;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            min-height: 240px;
        }
        video, canvas {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1); /* Mirror effect */
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .btn:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .btn-secondary { background-color: #6b7280; }
        .btn-secondary:hover { background-color: #4b5563; }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .close-modal {
            position: absolute;
            top: 1rem; right: 1rem;
            background: none; border: none;
            font-size: 1.5rem; cursor: pointer; color: #6b7280;
        }
        .result-title { color: var(--primary); margin-top: 0; }
        .result-item { margin-bottom: 1rem; border-bottom: 1px solid #f0f0f0; padding-bottom: 0.5rem; }
        .result-label { font-weight: bold; color: #4b5563; display: block; margin-bottom: 0.25rem; }
        .loading-spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 6px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔮 AI 职业方向预测</h1>
    
    <!-- Camera Section -->
    <div class="camera-section">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="camera-placeholder" style="padding: 40px; color: #fff;">
            摄像头未启动
        </div>
    </div>
    <button id="start-camera-btn" class="btn">📷 打开摄像头</button>
    <button id="capture-btn" class="btn" style="display:none;">✅ 确认拍照</button>
    <button id="retake-btn" class="btn btn-secondary" style="display:none;">🔄 重拍</button>

    <!-- Form -->
    <form id="prediction-form" style="margin-top: 2rem;">
        <div class="form-group">
            <label for="email">📧 接收报告的邮箱</label>
            <input type="email" id="email" required placeholder="example@email.com">
        </div>

        <div class="form-group">
            <label for="q1">1. 你最喜欢的活动类型？</label>
            <select id="q1" required>
                <option value="">请选择...</option>
                <option value="analytical">📊 分析与逻辑推理</option>
                <option value="creative">🎨 创意与艺术创作</option>
                <option value="social">🤝 社交与帮助他人</option>
                <option value="practical">🛠️ 动手操作与实践</option>
                <option value="leadership">🚀 领导与管理团队</option>
            </select>
        </div>

        <div class="form-group">
            <label for="q2">2. 你理想的工作环境是？</label>
            <select id="q2" required>
                <option value="">请选择...</option>
                <option value="office">🏢 传统办公室</option>
                <option value="remote">🏠 远程/居家办公</option>
                <option value="outdoor">🌳 户外/大自然</option>
                <option value="lab">🔬 实验室/研究中心</option>
                <option value="studio">🎭 工作室/创作空间</option>
            </select>
        </div>

        <div class="form-group">
            <label for="q3">3. 面对挑战时你通常？</label>
            <select id="q3" required>
                <option value="">请选择...</option>
                <option value="systematic">📝 系统化分析解决</option>
                <option value="intuitive">💡 凭直觉快速反应</option>
                <option value="collaborative">👥 寻求团队合作</option>
                <option value="persistent">💪 坚持不懈独自攻克</option>
                <option value="strategic">♟️ 制定策略迂回解决</option>
            </select>
        </div>

        <div class="form-group">
            <label for="q4">4. 你最看重工作的哪些方面？</label>
            <select id="q4" required>
                <option value="">请选择...</option>
                <option value="salary">💰 高薪与福利</option>
                <option value="impact">🌍 社会影响力</option>
                <option value="creativity">🎨 创造力发挥</option>
                <option value="stability">🛡️ 稳定与安全</option>
                <option value="growth">📈 个人成长空间</option>
            </select>
        </div>

        <div class="form-group">
            <label for="q5">5. 你如何处理复杂信息？</label>
            <select id="q5" required>
                <option value="">请选择...</option>
                <option value="visual">👁️ 图表与视觉化</option>
                <option value="textual">📖 文字阅读与总结</option>
                <option value="hands-on">👐 实际操作体验</option>
                <option value="discussion">🗣️ 讨论与交流</option>
                <option value="logical">🧮 逻辑推导与建模</option>
            </select>
        </div>

        <button type="submit" id="submit-btn" class="btn">🚀 获取 AI 职业预测</button>
        <div id="error-message" class="error-msg"></div>
    </form>
</div>

<!-- Result Modal -->
<div id="result-modal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal()">&times;</button>
        <h2 class="result-title">🎉 你的职业预测报告</h2>
        <div id="modal-body">
            <div class="loading-spinner"></div>
            <p style="text-align:center;">正在分析您的数据...</p>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const startBtn = document.getElementById('start-camera-btn');
    const captureBtn = document.getElementById('capture-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const placeholder = document.getElementById('camera-placeholder');
    const form = document.getElementById('prediction-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-message');
    const modal = document.getElementById('result-modal');
    const modalBody = document.getElementById('modal-body');

    let stream = null;
    let photoData = null;

    // 1. Open Camera
    startBtn.addEventListener('click', async () => {
        try {
            console.log('📷 Requesting camera access...');
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = stream;
            startBtn.style.display = 'none';
            placeholder.style.display = 'none';
            video.style.display = 'block';
            
            // Force play
            video.play().then(() => {
                console.log('▶️ Video playing');
                captureBtn.style.display = 'block';
            }).catch(err => console.error('Play error:', err));
        } catch (err) {
            console.error('❌ Camera error:', err);
            alert('无法访问摄像头：' + err.message + '\n请确保已允许权限并使用 HTTPS 访问。');
        }
    });

    // 2. Capture Photo
    captureBtn.addEventListener('click', () => {
        if (!stream) return;
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // Mirror draw
        context.translate(canvas.width, 0);
        context.scale(-1, 1);
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        photoData = canvas.toDataURL('image/jpeg');
        
        video.style.display = 'none';
        canvas.style.display = 'block';
        captureBtn.style.display = 'none';
        retakeBtn.style.display = 'block';
        console.log('📸 Photo captured');
    });

    // 3. Retake
    retakeBtn.addEventListener('click', () => {
        photoData = null;
        canvas.style.display = 'none';
        video.style.display = 'block';
        retakeBtn.style.display = 'none';
        captureBtn.style.display = 'block';
    });

    // 4. Submit Form
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!photoData) {
            alert('请先拍照！');
            return;
        }

        // Show Modal Immediately (Guaranteed)
        openModal("⏳ 正在提交数据并分析...", false);

        const formData = {
            email: document.getElementById('email').value,
            answers: {
                q1: document.getElementById('q1').value,
                q2: document.getElementById('q2').value,
                q3: document.getElementById('q3').value,
                q4: document.getElementById('q4').value,
                q5: document.getElementById('q5').value
            },
            photo: photoData
        };

        console.log('🚀 Sending data to API...', formData);

        try {
            const response = await fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const data = await response.json();
            console.log('✅ API Response:', data);

            if (!response.ok) {
                throw new Error(data.error || '服务器错误');
            }

            // Success: Update Modal with Real Data or Fallback
            const report = data.report || generateFallbackReport(formData.answers);
            updateModalContent(report, true);

        } catch (error) {
            console.error('❌ Submission error:', error);
            // Even on error, show fallback report in Modal
            const fallback = generateFallbackReport(formData.answers);
            updateModalContent(fallback, false, error.message);
        }
    });

    // Helper: Open Modal
    function openModal(htmlContent, isHtml = true) {
        modalBody.innerHTML = isHtml ? htmlContent : `<p>${htmlContent}</p>`;
        modal.style.display = 'flex';
        console.log('👀 Modal displayed');
    }

    // Helper: Update Modal Content
    function updateModalContent(report, isSuccess, errorMsgText = null) {
        let html = `
            <div class="result-item">
                <span class="result-label">🎯 推荐职业方向</span>
                <div style="font-size: 1.2rem; font-weight: bold; color: #4F46E5;">${report.career}</div>
            </div>
            <div class="result-item">
                <span class="result-label">💡 匹配理由</span>
                <p>${report.reason}</p>
            </div>
            <div class="result-item">
                <span class="result-label">🛣️ 发展路径建议</span>
                <ul style="padding-left: 20px; margin: 5px 0;">
                    ${report.steps.map(s => `<li>${s}</li>`).join('')}
                </ul>
            </div>
        `;

        if (!isSuccess) {
            html += `<div style="background:#fff3cd; padding:10px; border-radius:6px; margin-top:10px; font-size:0.9rem;">
                ⚠️ 注意：${errorMsgText || "演示模式"}。配置 NVIDIA API Key 后即可获得详细 AI 分析报告。
            </div>`;
        } else {
            html += `<div style="background:#ecfdf5; padding:10px; border-radius:6px; margin-top:10px; font-size:0.9rem; color:#065f46;">
                ✅ 详细报告已发送至您的邮箱！
            </div>`;
        }

        modalBody.innerHTML = html;
    }

    // Helper: Close Modal
    function closeModal() {
        modal.style.display = 'none';
    }

    // Close on outside click
    window.onclick = function(event) {
        if (event.target == modal) closeModal();
    }

    // Fallback Report Generator (Client-side logic if API fails)
    function generateFallbackReport(answers) {
        const careers = {
            'analytical': '数据科学家 / 软件工程师',
            'creative': 'UI/UX 设计师 / 内容创作者',
            'social': '人力资源专家 / 心理咨询师',
            'practical': '机械工程师 / 建筑师',
            'leadership': '产品经理 / 企业高管'
        };
        const primary = answers.q1;
        return {
            career: careers[primary] || '综合管理人才',
            reason: '基于您的选择，您倾向于' + primary + '类型的工作，这在科技与创意行业非常有价值。',
            steps: [
                '短期：学习相关基础技能（如 Python, Design Tools）',
                '中期：参与实际项目积累经验',
                '长期：成为领域专家或团队领导者'
            ]
        };
    }
</script>

</body>
</html>
