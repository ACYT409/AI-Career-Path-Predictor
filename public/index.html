<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 职业方向预测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        .section-title {
            font-size: 1.3em;
            color: #667eea;
            margin-bottom: 15px;
            font-weight: bold;
        }
        /* Camera Styles */
        #video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto 20px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }
        #video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }
        #canvas {
            display: none;
        }
        #photo-preview {
            width: 100%;
            max-width: 640px;
            margin: 20px auto;
            border-radius: 10px;
            display: none;
            border: 4px solid #667eea;
            transform: scaleX(-1);
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .button-group {
            text-align: center;
            margin-top: 20px;
        }
        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        input[type="email"], textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input[type="email"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .question-item {
            margin-bottom: 20px;
        }
        .question-text {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .options-label {
            display: block;
            padding: 10px;
            margin: 5px 0;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .options-label:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 AI 职业方向预测</h1>
        
        <!-- Camera Section -->
        <div class="section">
            <div class="section-title">📷 拍摄照片</div>
            <div id="video-container">
                <video id="video" autoplay playsinline muted></video>
            </div>
            <canvas id="canvas"></canvas>
            <img id="photo-preview" alt="照片预览">
            <div class="button-group">
                <button id="open-camera-btn" class="btn btn-primary" onclick="openCamera()">
                    📷 打开摄像头
                </button>
                <button id="capture-btn" class="btn btn-success hidden" onclick="capturePhoto()">
                    ✅ 确认拍照
                </button>
                <button id="retake-btn" class="btn btn-secondary hidden" onclick="retakePhoto()">
                    🔄 重拍
                </button>
                <button id="close-camera-btn" class="btn btn-danger hidden" onclick="closeCamera()">
                    ❌ 关闭摄像头
                </button>
            </div>
            <div id="camera-status" class="status-message hidden"></div>
        </div>

        <!-- Email Section -->
        <div class="section">
            <div class="section-title">📧 联系邮箱</div>
            <div class="form-group">
                <label for="email">请输入您的邮箱地址（用于接收预测报告）：</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>
        </div>

        <!-- Questions Section -->
        <div class="section">
            <div class="section-title">❓ 职业倾向测试</div>
            
            <div class="question-item">
                <div class="question-text">1. 你最喜欢的活动类型是？</div>
                <label class="options-label">
                    <input type="radio" name="q1" value="analytical" required>
                    🔍 分析研究、解决复杂问题
                </label>
                <label class="options-label">
                    <input type="radio" name="q1" value="creative">
                    🎨 创意设计、艺术表达
                </label>
                <label class="options-label">
                    <input type="radio" name="q1" value="social">
                    👥 与人交流、帮助他人
                </label>
                <label class="options-label">
                    <input type="radio" name="q1" value="practical">
                    🛠️ 动手操作、实际制作
                </label>
                <label class="options-label">
                    <input type="radio" name="q1" value="leadership">
                    📊 领导团队、制定策略
                </label>
            </div>

            <div class="question-item">
                <div class="question-text">2. 你理想的工作环境是？</div>
                <label class="options-label">
                    <input type="radio" name="q2" value="office" required>
                    🏢 传统办公室，结构清晰
                </label>
                <label class="options-label">
                    <input type="radio" name="q2" value="remote">
                    🏠 远程工作，自由灵活
                </label>
                <label class="options-label">
                    <input type="radio" name="q2" value="outdoor">
                    🌳 户外环境，亲近自然
                </label>
                <label class="options-label">
                    <input type="radio" name="q2" value="lab">
                    🔬 实验室，专业设备
                </label>
                <label class="options-label">
                    <input type="radio" name="q2" value="studio">
                    🎭 工作室，创意氛围
                </label>
            </div>

            <div class="question-item">
                <div class="question-text">3. 面对挑战时，你通常会？</div>
                <label class="options-label">
                    <input type="radio" name="q3" value="systematic" required>
                    📋 系统分析，逐步解决
                </label>
                <label class="options-label">
                    <input type="radio" name="q3" value="intuitive">
                    💡 凭直觉快速决策
                </label>
                <label class="options-label">
                    <input type="radio" name="q3" value="collaborative">
                    🤝 寻求团队合作
                </label>
                <label class="options-label">
                    <input type="radio" name="q3" value="persistent">
                    💪 坚持不懈，独自攻克
                </label>
                <label class="options-label">
                    <input type="radio" name="q3" value="strategic">
                    ♟️ 制定策略，寻找捷径
                </label>
            </div>

            <div class="question-item">
                <div class="question-text">4. 你最看重工作的哪些方面？</div>
                <label class="options-label">
                    <input type="radio" name="q4" value="salary" required>
                    💰 高薪待遇
                </label>
                <label class="options-label">
                    <input type="radio" name="q4" value="impact">
                    🌟 社会影响力
                </label>
                <label class="options-label">
                    <input type="radio" name="q4" value="creativity">
                    🎨 创意发挥空间
                </label>
                <label class="options-label">
                    <input type="radio" name="q4" value="stability">
                    🏛️ 工作稳定性
                </label>
                <label class="options-label">
                    <input type="radio" name="q4" value="growth">
                    📈 个人成长机会
                </label>
            </div>

            <div class="question-item">
                <div class="question-text">5. 你如何处理复杂信息？</div>
                <label class="options-label">
                    <input type="radio" name="q5" value="visual" required>
                    📊 通过图表、可视化方式
                </label>
                <label class="options-label">
                    <input type="radio" name="q5" value="textual">
                    📖 阅读文字资料
                </label>
                <label class="options-label">
                    <input type="radio" name="q5" value="hands-on">
                    🛠️ 动手实践操作
                </label>
                <label class="options-label">
                    <input type="radio" name="q5" value="discussion">
                    💬 与他人讨论交流
                </label>
                <label class="options-label">
                    <input type="radio" name="q5" value="logical">
                    🧮 逻辑推理分析
                </label>
            </div>
        </div>

        <!-- Submit Button -->
        <div class="button-group">
            <button id="submit-btn" class="btn btn-primary" onclick="submitPrediction()" style="font-size: 1.2em; padding: 15px 40px;">
                🚀 获取 AI 职业预测
            </button>
        </div>

        <!-- Status Message -->
        <div id="status-message" class="status-message hidden"></div>
    </div>

    <script>
        let videoStream = null;
        let photoData = null;

        // Open Camera with better compatibility
        async function openCamera() {
            const video = document.getElementById('video');
            const videoContainer = document.getElementById('video-container');
            const captureBtn = document.getElementById('capture-btn');
            const closeBtn = document.getElementById('close-camera-btn');
            const openBtn = document.getElementById('open-camera-btn');
            const statusDiv = document.getElementById('camera-status');

            try {
                statusDiv.className = 'status-message status-info';
                statusDiv.textContent = '正在请求摄像头权限...';
                statusDiv.classList.remove('hidden');

                // Try different constraints for better compatibility
                const constraints = {
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user'
                    },
                    audio: false
                };

                videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                video.srcObject = videoStream;
                
                // Force play after metadata loads
                video.onloadedmetadata = () => {
                    video.play().then(() => {
                        console.log('✅ Video playing successfully');
                    }).catch(playError => {
                        console.error('⚠️ Play failed:', playError);
                        // Try again with different approach
                        video.muted = true;
                        video.playsInline = true;
                        video.play();
                    });
                };

                videoContainer.style.display = 'block';
                openBtn.classList.add('hidden');
                captureBtn.classList.remove('hidden');
                closeBtn.classList.remove('hidden');

                statusDiv.className = 'status-message status-success';
                statusDiv.textContent = '✅ 摄像头已启动！请点击"确认拍照"';
                
            } catch (err) {
                console.error('❌ Camera error:', err);
                statusDiv.className = 'status-message status-error';
                
                if (err.name === 'NotAllowedError') {
                    statusDiv.textContent = '❌ 摄像头权限被拒绝。请在浏览器设置中允许摄像头访问。';
                } else if (err.name === 'NotFoundError') {
                    statusDiv.textContent = '❌ 未找到摄像头设备。请检查是否连接了摄像头。';
                } else if (err.name === 'NotReadableError') {
                    statusDiv.textContent = '❌ 摄像头可能被其他程序占用。请关闭其他使用摄像头的软件后重试。';
                } else {
                    statusDiv.textContent = '❌ 无法启动摄像头：' + err.message;
                }
            }
        }

        // Capture Photo
        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const photoPreview = document.getElementById('photo-preview');
            const videoContainer = document.getElementById('video-container');
            const captureBtn = document.getElementById('capture-btn');
            const retakeBtn = document.getElementById('retake-btn');
            const closeBtn = document.getElementById('close-camera-btn');

            if (!videoStream) {
                alert('请先打开摄像头！');
                return;
            }

            // Set canvas size to match video
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;

            // Draw video frame to canvas (flip horizontally)
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convert to base64
            photoData = canvas.toDataURL('image/jpeg', 0.8);
            photoPreview.src = photoData;
            photoPreview.style.display = 'block';

            // Stop video stream
            closeCamera();

            // Update buttons
            videoContainer.style.display = 'none';
            captureBtn.classList.add('hidden');
            retakeBtn.classList.remove('hidden');

            alert('✅ 照片已拍摄成功！');
        }

        // Retake Photo
        function retakePhoto() {
            const photoPreview = document.getElementById('photo-preview');
            const videoContainer = document.getElementById('video-container');
            const captureBtn = document.getElementById('capture-btn');
            const retakeBtn = document.getElementById('retake-btn');
            const openBtn = document.getElementById('open-camera-btn');

            photoPreview.style.display = 'none';
            photoData = null;

            retakeBtn.classList.add('hidden');
            openBtn.classList.remove('hidden');
            
            openCamera();
        }

        // Close Camera
        function closeCamera() {
            const video = document.getElementById('video');
            const videoContainer = document.getElementById('video-container');
            const statusDiv = document.getElementById('camera-status');

            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }

            video.srcObject = null;
            videoContainer.style.display = 'none';
            statusDiv.classList.add('hidden');
        }

        // Get selected radio value
        function getRadioValue(name) {
            const radios = document.getElementsByName(name);
            for (let i = 0; i < radios.length; i++) {
                if (radios[i].checked) {
                    return radios[i].value;
                }
            }
            return null;
        }

        // Submit Prediction
        async function submitPrediction() {
            const email = document.getElementById('email').value.trim();
            const q1 = getRadioValue('q1');
            const q2 = getRadioValue('q2');
            const q3 = getRadioValue('q3');
            const q4 = getRadioValue('q4');
            const q5 = getRadioValue('q5');
            const statusDiv = document.getElementById('status-message');
            const submitBtn = document.getElementById('submit-btn');

            // Validation
            if (!email) {
                alert('请输入邮箱地址！');
                return;
            }

            if (!q1 || !q2 || !q3 || !q4 || !q5) {
                alert('请回答所有问题！');
                return;
            }

            if (!photoData) {
                alert('请先拍摄照片！');
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('请输入有效的邮箱地址！');
                return;
            }

            // Show loading
            statusDiv.className = 'status-message status-info';
            statusDiv.innerHTML = '<span class="loading"></span>正在分析中，请稍候...';
            statusDiv.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                // Prepare data
                const requestData = {
                    email: email,
                    answers: {
                        q1: q1,
                        q2: q2,
                        q3: q3,
                        q4: q4,
                        q5: q5
                    },
                    photo: photoData
                };

                // Call API
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    statusDiv.className = 'status-message status-success';
                    statusDiv.innerHTML = '✅ 预测完成！详细报告已发送到您的邮箱：<strong>' + email + '</strong>';
                    
                    // Reset form after 3 seconds
                    setTimeout(() => {
                        statusDiv.classList.add('hidden');
                        submitBtn.disabled = false;
                        // Optional: reset form
                        // location.reload();
                    }, 5000);
                } else {
                    throw new Error(result.error || '预测失败');
                }

            } catch (error) {
                console.error('Submission error:', error);
                statusDiv.className = 'status-message status-error';
                statusDiv.innerHTML = '❌ 错误：' + error.message;
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
