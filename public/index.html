<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 职业方向预测</title>
    <style>
        :root { --primary: #4F46E5; --bg: #f3f4f6; --text: #1f2937; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
        .camera-section { background: #000; border-radius: 8px; overflow: hidden; position: relative; min-height: 240px; text-align: center; margin-bottom: 1.5rem; }
        video, canvas { width: 100%; height: auto; display: none; transform: scaleX(-1); }
        .btn { display: block; width: 100%; padding: 0.75rem; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        .btn:hover { opacity: 0.9; }
        .btn-secondary { background: #6b7280; }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 2rem; border-radius: 12px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .result-item { margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
        .result-label { font-weight: bold; color: #555; display: block; margin-bottom: 0.25rem; }
        .loading { text-align: center; padding: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔮 AI 职业方向预测</h1>
    
    <div class="camera-section">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div id="placeholder" style="padding: 40px; color: #fff;">摄像头未启动</div>
    </div>
    <button id="startBtn" class="btn">📷 打开摄像头</button>
    <button id="captureBtn" class="btn" style="display:none">✅ 确认拍照</button>
    <button id="retakeBtn" class="btn btn-secondary" style="display:none">🔄 重拍</button>

    <form id="form" style="margin-top: 2rem;">
        <div class="form-group">
            <label>📧 邮箱</label>
            <input type="email" id="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>1. 喜欢的活动？</label>
            <select id="q1" required>
                <option value="">请选择...</option>
                <option value="analytical">📊 分析逻辑</option>
                <option value="creative">🎨 创意艺术</option>
                <option value="social">🤝 社交帮助</option>
                <option value="practical">🛠️ 动手操作</option>
                <option value="leadership">🚀 领导管理</option>
            </select>
        </div>
        <div class="form-group">
            <label>2. 理想环境？</label>
            <select id="q2" required>
                <option value="">请选择...</option>
                <option value="office">🏢 办公室</option>
                <option value="remote">🏠 远程</option>
                <option value="outdoor">🌳 户外</option>
                <option value="lab">🔬 实验室</option>
                <option value="studio">🎭 工作室</option>
            </select>
        </div>
        <div class="form-group">
            <label>3. 面对挑战？</label>
            <select id="q3" required>
                <option value="">请选择...</option>
                <option value="systematic">📝 系统分析</option>
                <option value="intuitive">💡 直觉反应</option>
                <option value="collaborative">👥 团队合作</option>
                <option value="persistent">💪 坚持攻克</option>
                <option value="strategic">♟️ 策略迂回</option>
            </select>
        </div>
        <div class="form-group">
            <label>4. 看重什么？</label>
            <select id="q4" required>
                <option value="">请选择...</option>
                <option value="salary">💰 高薪</option>
                <option value="impact">🌍 影响力</option>
                <option value="creativity">🎨 创造力</option>
                <option value="stability">🛡️ 稳定</option>
                <option value="growth">📈 成长</option>
            </select>
        </div>
        <div class="form-group">
            <label>5. 处理信息？</label>
            <select id="q5" required>
                <option value="">请选择...</option>
                <option value="visual">👁️ 视觉图表</option>
                <option value="textual">📖 文字阅读</option>
                <option value="hands-on">👐 实际操作</option>
                <option value="discussion">🗣️ 讨论交流</option>
                <option value="logical">🧮 逻辑推导</option>
            </select>
        </div>
        <button type="submit" class="btn">🚀 获取预测</button>
    </form>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal()">&times;</button>
        <h2 style="color:var(--primary)">🎉 预测报告</h2>
        <div id="modalBody"><div class="loading">正在分析...</div></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const placeholder = document.getElementById('placeholder');
    let stream = null;
    let photoData = null;

    document.getElementById('startBtn').onclick = async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.style.display = 'block';
            placeholder.style.display = 'none';
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'block';
            video.play();
        } catch(e) { alert('摄像头错误: ' + e.message); }
    };

    document.getElementById('captureBtn').onclick = () => {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);
        photoData = canvas.toDataURL('image/jpeg');
        video.style.display = 'none'; canvas.style.display = 'block';
        document.getElementById('captureBtn').style.display = 'none';
        document.getElementById('retakeBtn').style.display = 'block';
    };

    document.getElementById('retakeBtn').onclick = () => {
        photoData = null; canvas.style.display = 'none'; video.style.display = 'block';
        document.getElementById('retakeBtn').style.display = 'none'; document.getElementById('captureBtn').style.display = 'block';
    };

    document.getElementById('form').onsubmit = async (e) => {
        e.preventDefault();
        if(!photoData) return alert('请先拍照');
        const modal = document.getElementById('modal');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = '<div class="loading">⏳ 正在分析數據（預計 10-15 秒）...</div>';

        try {
            const res = await fetch('/api/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    answers: { q1: document.getElementById('q1').value, q2: document.getElementById('q2').value, q3: document.getElementById('q3').value, q4: document.getElementById('q4').value, q5: document.getElementById('q5').value },
                    photo: photoData
                })
            });
            const result = await res.json();
            if(res.ok && result.report) {
                showResult(result.report, true);
            } else {
                throw new Error(result.error || 'API 解析失敗');
            }
        } catch(err) {
            console.error(err);
            showResult({ career: '分析超時', reason: '請檢查網絡並重試。', steps: ['重新提交', '檢查 API 配置'] }, false, err.message);
        }
    };

    // --- 關鍵修正：防禦性顯示邏輯 ---
    function showResult(report, success, errorMsg) {
        const body = document.getElementById('modalBody');
        const format = (v) => (typeof v === 'object' ? (v.name || v.title || JSON.stringify(v)) : (v || '無數據'));

        body.innerHTML = `
            <div class="result-item"><span class="result-label">🎯 推荐职业</span><b>${format(report.career)}</b></div>
            <div class="result-item"><span class="result-label">💡 理由</span>${format(report.reason)}</div>
            <div class="result-item"><span class="result-label">🛣️ 建议</span><ul>${(report.steps || []).map(s => `<li>${format(s}</li>`).join('')}</ul></div>
            ${success ? '<div style="color:green; margin-top:10px">✅ 报告已发送至邮箱</div>' : `<div style="color:red; margin-top:10px">⚠️ 錯誤: ${errorMsg}</div>`}
        `;
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target.id === 'modal') closeModal(); }
</script>
</body>
</html>
